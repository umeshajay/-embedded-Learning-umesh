<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="pragma" content="no-cache" />
    <title>Embedded + TinyML Math Path</title>
    <link rel="stylesheet" href="styles.css?v=3" />
  </head>
  <body>
    <main class="app">
      <header class="masthead">
        <div class="masthead-top">
          <span class="chip">EMBEDDED + TINYML PATH</span>
          <button id="resetProgress" class="icon-button" title="Reset saved progress" aria-label="Reset saved progress">↻</button>
        </div>
        <h1>Math for <span>Embedded TinyML</span></h1>
        <p>Read the guide, master each quiz at 90%, and unlock the math path from registers to neural networks.</p>
        <nav class="tabs" aria-label="App sections">
          <button class="tab active" data-tab="study">Cs fundamentals</button>
          <button class="tab" data-tab="cs50">Cs50x</button>
          <button class="tab" data-tab="foundations">Maths Foundations</button>
          <button class="tab" data-tab="progress">Progress</button>
        </nav>
      </header>

      <section id="studyPanel" class="panel active" aria-live="polite">
        <div id="studyView"></div>
      </section>

      <section id="progressPanel" class="panel" aria-live="polite">
        <div id="progressView"></div>
      </section>

      <section id="foundationsPanel" class="panel" aria-live="polite">
        <div id="foundationsView"></div>
      </section>

      <section id="cs50Panel" class="panel" aria-live="polite">
        <div id="cs50View"></div>
      </section>
    </main>

    <script src="script.js?v=3"></script>
  </body>
</html>
